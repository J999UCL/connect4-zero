[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "connect4-zero"
version = "0.1.0"
description = "AlphaZero-style reinforcement learning for gravity-based 4x4x4 Connect Four."
requires-python = ">=3.11,<3.12"
dependencies = [
  "numpy>=1.26",
  "safetensors>=0.4",
  "torch>=2.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=7.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
addopts = "-ra"
